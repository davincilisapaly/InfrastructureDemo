name: Security Scanning

on:
  workflow_call

jobs:
  trivy-scan:
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request == null}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    #   - name: Build an image from Dockerfile
    #     run: docker build -t docker.io/my-organization/my-app:${{ github.sha }} .
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'          # path in the repo to scan
          format: 'table'        # or 'sarif' for code scanning
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'         # fail on findings

  gitleaks-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  zizmor-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read # only needed for private or internal repos
      actions: read # only needed for private or internal repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          # optional: narrow what to scan
        #   inputs: |
        #    infrastructure
        #    .github/workflows
          # key bit: don't fail when there are no inputs
          #fail-on-no-inputs: false

